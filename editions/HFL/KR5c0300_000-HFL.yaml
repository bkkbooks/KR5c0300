front:
  text: 稚川眞人校證術似三
  hash: sha256:0e1ec2e851cb0c2eb664e5e85951b6f6c164494c6259ea9708e0b7a0f1736cc7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0300_HFL_000-001a, image: hfl/0588/0588-074.png}
body:
  text: 先天圖不録係系傳授圖川客楊么楊旭周化寫毫隠名無傳燕山孟先生無傳無名氏宼叔原丹成之後授于容西方仲成崔黄冠不知所終戴道亨周道成傳派多先天論夫物禀先天之炁位屬庚辛上應太白金星是謂西王母産出南方赤鳯髓是謂後天號曰金鉛又曰美金華又曰鉛白霜又曰金液錬以萬鈞之火終不能使之枯遇土則燥聖功出焉合母則成胚胎生焉骨肉生焉此則定造化無中生有金伐木榮此其義也四象備中央爲之主三家聚中宫爲之寳寶主之義非造大丹之妙而未易明此淮南王煉秋石以産無窮之寳故上帝惜之而又哀憫衆生萬劫一傳得之得者非宿有仙骨苟傳非人𣧎及九祖玄科曰祕天道泄大寳罪所不赦眞訣云雄裏内含雌質負隂却抱陽精四象全憑調爕土金產岀黄金大藥證曰鍊粉爲鉛化石爲麈自然火化去鉛取丹更入華池還源還色再入神室更養以火全六十日成金液丹服之神仙祕文夫修大丹與天地造化同途故太易在太素之前雖含虚至妙則來立兆萌太極在太乙之先故有昆成乃混沌也中有太乙之精爲天地之毋爲萬物之始一炁旣分二儀斯判然後有乾坤焉有隂陽焉有三才五行焉有五金八石焉修丹者以乾坤爲鼎器以人民爲藥物盜隂陽變化之機精調水火循坎离否泰之理苦歷星霜動則起於陽九靜則起於隂六此修丹之大㫖也葛仙翁述神室吟淺深神室鑄新成内外安排别有名白虎但將龍共配青龍還與虎同行二儀本是金和合萬象皆由土發生玄了又玄眞了了九重城裏有誰爭袐訣淵原眞鉛生庚眞汞生亥其法二因汞以陽爲庚以隂制配合中宫上下火熾轉作丹基一七之日無名氏以傳三人至崔黄冠名曰金汞再術在世九十餘年後不知所終其法四變一變名就胎借炁二變名隂質陽胎三變名六神伏尸四變名朱髓換形金汞丹砂術歌曰灰埋玄鼎火温灰一夕黄芽立可濟九轉丹砂成五内剖開夀永齊天地西方仲成授道西方仲成從崔黄冠歳乆恭敬謹恪屢經艱苦母遭驗試畧無少怠黄冠曰子可受道矣遂擇日登壇仲成炷香盟天再拜稽首跪而授道崔公及告之曰昔求仙㫖正傳一人爲爾仙風道骨雖處稠人之中超然獨異今將仙師所傳之祕藥物斤兩火候指歸全其所聞汝後若遇德行謹備酷志學道之士方可傳之亦如余之授子無所隱焉遂授四變九轉之經一變就胎借炁汞乃木之精本是朱之髓恰欲出胎時要借眞陽力不得正陽精眞母亦難制一變感眞陽此謂借胎炁二變隂質陽胎胎孕以潛陽隂伏莫暫忘更籍結庚炁純陽守洞房學者湏子細莫謾誇胸臆二變得陽晶面目爲隂質三變六神伏尸神仙六神法上眞常祕藏三時文火養表裏以純陽愚夫莫忘思至死空嗟咨三變流滑性陽煞以成屍四變朱髓換形須識二因宗眞鉛炁便道氤氲文火養交感在中宫七日道方畢金粟自然成成寳終四變朱髓換其形火候歌晝夜屯蒙翻二卦便將眞母制眞鉛神仙到此多緘口不許尋常着意尋赫赤金丹汞結金要歸眞土漸歸眞三時火候牢封閉勿使榮髙却䘮身袐傳神法自校證方信玄中别有師捉得虎龍歸正土自然造化有嬰兒眞奥偉哉妙法來自校證不離二味一雄一雌雄曰眞鉛雌曰眞汞配合中宫自然交應旣濟乃成未濟亦可不失三時七日息火鼎内增金全憑道心青龍飛躍白虎制擒一制一伏番爲子母九轉數足黃芽自出旣得黃芽神仙有家再生再産青龍返砂丹砂一粒先祭天地後爲己服永出死籍雞飡成鳯蛇化爲龍吾皆面傳九九之功昔因師授全憑火候火候不差立作金華火候有差邈焉無涯火候有訣今爲汝説旣得勿爲人泄我若不言恐絶天根西方仲成祕哉斯文所以寳歌世人寳金玉不知其所巳或以羙梳粧或者美宫室千縱巧施爲未免皆虚誑何不作還丹壽命無窮已鍊丹歌大藥無過甲與庚鍊成兒女得相親教君看取丹成後萬里乾坤一鶴鳴鍊丹祕訣良無頭釜無耳庚爲表辛爲裹朱衣子紅鑚髓更無别物直下制惟有水火相匹配水銀一味别無物先作骨兮後作肉骨肉相依化作親從此河車任徃復金化金兮銀化銀何曾更有别聖神轉制分胎三度外更兼宗祖是囂麈燕雀不生鳯狐兔不乳馬若無眞父母所生俱是假穿心立制法天爲穿心地爲立制八石消亡五金同類欲乾朱汞必假祖氣養火七日翻復旣濟再養七日澆淋滲制傳後式疇昔先帥嘗戒余曰此術之妙可登金丹或者福薄止爲至寳又曰君子之幸小人得之不幸隂符經云君子得之固窮小人得之輕命蓋道人得之心富矣身貧固亦善矣小人則曰有生有死人之常理豈有無情之金石能化有情之血肉耶但能家富身榮華居麗室粉白黛緑食前方丈歌舞綺筵猒酒飽肉恣極其飲畧不回互一旦天譴前日所授之師亦招咎焉可不慎歟汝苟棄君子之行小人之見不獨汝軰有禍吾獨何面目見先師於上天乎昔祖代仙師未嘗不造戒叮嚀余敢不懼焉旣傳之後汝宜鑒戒福禄無替西方仲成傳戴道亨是夜甲子上元七日西方面南向北斗道亨長跪求授仙術乃告之曰昔葛仙羽傳鄭思遠傳葛稚川稚川乃仙翁裔也仙翁不傳之子而得思遠其意何如蓋自修丹之士則於父子兄弟之親無有傳者之理也如稚父之志思遠報帥之德可謂兩全其美矣然諸仙祖師自鍊丹修養成道何其傳授之當也今將先師口訣巳上諸丈傳泒受授之法及穿心立制手法之祕又言此術先可作次作九轉金液還丹待須聖師指示然後能成大藥道亨再拜稽首而謝曰今蒙垂教敢不奉謹皆叨師廕萬一有成九轉丹砂畢繼而受之也戴道亨傳楊旭名朱髓換形丹術道亨禀性孤潔不與世合冠年慕仙夙志愈堅後遇眞人前後之傳金汞丹術釋然有似得其捷徑而成穿心立制便得正眞之理可謂識之深德之厚也初不欲人知覺後有同郡楊旭兄弟二人學道日遠功德深著心知戴公非常人遂篤志盡心以奉焉歳乆不倦戴公亦知楊旭兄弟不凡夙有仙契遂擇日盡授丹訣及所自悟者可謂傳得其人其道畧則畧矣巳妙無加焉眞一子金丹歌大道生吾身隂陽寄吾質託身天地間死生互相歷死生中有門門路各分格一門隂靜中於中是靈寂修成隂中神此是西方術别有陽中道妙祕在仙籍徑指天地根此根號眞一生於天地先天地因而闢令人採取積諫爲庚辛室邀取木中龍合之令契密忽然爲夫婦漸生男與女十月兒女成盡化爲金液金液作神丹餌之天地畢盡情告同人何方留意覔日月疾如風三萬六千日崔黄冠替曰大哉至道天地之根運乎眞一開通妙門神丹造化火候不繁抽來正汞配與眞鉛上天下地日月經歷寒暑驅分得成南北會合東西汞白鉛赤餌之丹砂神仙有家稚川眞人校證術
